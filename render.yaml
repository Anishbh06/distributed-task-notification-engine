# Render Blueprint - Multi-service deployment
services:
  - type: web
    name: task-engine-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: task-engine-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: task-engine-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PROGRESS_CHANNEL
        value: task:progress
    healthCheckPath: /health

  - type: web
    name: task-engine-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-engine-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: task-engine-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: task-engine-redis
          property: connectionString
    dockerCommand: sh -c "celery -A app.core.celery_app worker --loglevel=info --pool=threads & python -m http.server 10000"

  - type: redis
    name: task-engine-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: task-engine-db
    plan: free
    databaseName: task_engine
